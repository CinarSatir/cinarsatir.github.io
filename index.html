<!DOCTYPE html>
<html>
<head>
    <title>Giriş Yap / Hesap Oluştur</title>
</head>
<body>
    <h1>Siteye Hoşgeldiniz</h1>
    
    <h2>Giriş Yap</h2>
    <form action="anasayfa.html" method="get">
        <label>Kullanıcı Adı:</label>
        <input type="text" required><br>
        <label>Şifre:</label>
        <input type="password" required><br>
        <button type="submit">Giriş Yap</button>
    </form>

    <h2>Hesap Oluştur</h2>
    <form action="anasayfa.html" method="get">
        <label>Kullanıcı Adı:</label>
        <input type="text" required><br>
        <label>Şifre:</label>
        <input type="password" required><br>
        <button type="submit">Hesap Oluştur</button>
    </form>
</body>
</html>
